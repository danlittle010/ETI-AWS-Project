<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Flights - Expedia Lite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body>
  <nav class="navbar expedia-navbar">
    <div class="container">
      <a class="navbar-brand" href="main.html">✈️ Expedia Lite</a>
      <div class="nav-links">
        <a href="main.html" class="btn btn-outline-light btn-sm me-2">Home</a>
        <a href="Login.html" class="btn btn-outline-light btn-sm">Login</a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="h3">Saved Flight Search Results</h1>
        <p class="text-muted mb-0">Loaded from <code>flight-results.json</code>.</p>
      </div>
      <button id="refreshButton" class="btn btn-primary">Refresh</button>
    </div>

    <div id="flightResults" class="mb-4"></div>

    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Raw JSON</h5>
        <pre id="rawJson" class="bg-light p-3 rounded" style="max-height: 420px; overflow:auto; white-space: pre-wrap;"></pre>
      </div>
    </div>
  </main>

  <footer class="text-center py-3">
    <p class="mb-0">&copy; 2026 My Website. All rights reserved.</p>
  </footer>

  <script src="flight-results-client.js"></script>
</body>
</html>
