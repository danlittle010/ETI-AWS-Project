<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signup - Tech Tomorrow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Signup.css">
</head>
<body>
    <div class="box">
        <h2>Create Your Account</h2>
        <form id="signupForm">
            <div class="mb-2">
                <label for="fullname" class="form-label">Full Name *</label>
                <input type="text" class="form-control" id="fullname" required>
            </div>
            <div class="mb-2">
                <label for="signupEmail" class="form-label">Email *</label>
                <input type="email" class="form-control" id="signupEmail" required>
            </div>
            <div class="mb-2">
                <label for="signupPassword" class="form-label">Password *</label>
                <input type="password" class="form-control" id="signupPassword" required>
            </div>
            <div class="mb-2">
                <label for="confirmPassword" class="form-label">Confirm Password *</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Signup & Save JSON</button>
                <button type="button" id="saveSignupJson" class="btn btn-secondary">Save Signup Info to JSON</button>
            </div>
        </form>
        <div id="signupOutput" class="mt-3"></div>
        <div class="text-center mt-3">
            <p class="text-muted small">Already have an account? <a href="Login.html">Login here</a></p>
        </div>
    </div>

    <script src="Signup.js"></script>
</body>
</html>
